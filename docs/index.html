<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --paper: #efe5cf;
      --ink: #121210;
      --red: #a41814;
      --red-soft: #d74a3c;
      --muted: #8d806f;
      --line: rgba(239, 229, 207, .24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--paper);
      background:
        radial-gradient(circle at 14% 10%, rgba(164, 24, 20, .32), transparent 30%),
        linear-gradient(135deg, #080807, #1a1411 52%, #090908);
    }

    .app {
      width: min(1160px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
    }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 22px;
      background:
        radial-gradient(circle at 50% 18%, rgba(239, 229, 207, .16), transparent 30%),
        radial-gradient(circle at 22% 12%, rgba(164, 24, 20, .34), transparent 28%),
        linear-gradient(140deg, #050504, #19110f 56%, #050504);
      transition: opacity .42s ease, visibility .42s ease;
    }

    .splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .splash-card {
      width: min(960px, 100%);
      display: grid;
      grid-template-columns: minmax(230px, 360px) minmax(0, 1fr);
      gap: clamp(22px, 5vw, 56px);
      align-items: center;
    }

    .cover-stack {
      position: relative;
      aspect-ratio: 2 / 3;
      filter: drop-shadow(0 26px 34px rgba(0, 0, 0, .54));
    }

    .cover-stack::before,
    .cover-stack::after {
      content: "";
      position: absolute;
      inset: 8px -10px -8px 10px;
      border: 1px solid rgba(239, 229, 207, .3);
      background: rgba(239, 229, 207, .12);
    }

    .cover-stack::after {
      inset: 16px -18px -16px 18px;
      opacity: .45;
    }

    .cover-stack img {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, .24);
      background: var(--paper);
    }

    .splash-copy {
      display: grid;
      gap: 16px;
    }

    .splash-copy h2 {
      margin: 0;
      color: #fffaf1;
      font-size: clamp(42px, 8vw, 96px);
      line-height: .88;
      text-transform: uppercase;
    }

    .splash-copy p {
      max-width: 560px;
      margin: 0;
      color: #d8c7a5;
      font-size: 16px;
      line-height: 1.6;
    }

    .open-slider {
      width: min(440px, 100%);
      min-height: 58px;
      border: 2px solid var(--paper);
      background: rgba(239, 229, 207, .08);
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
      --open-progress: 0%;
      --handle-x: 0px;
    }

    .open-slider::before {
      content: "SWIPE TO OPEN";
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #f5ead6;
      font-size: 13px;
      font-weight: 950;
      letter-spacing: .18em;
    }

    .slider-fill {
      position: absolute;
      inset: 0 auto 0 0;
      width: var(--open-progress, 0%);
      background: rgba(164, 24, 20, .72);
      transition: width .18s ease;
    }

    .slider-handle {
      position: absolute;
      top: 7px;
      left: 7px;
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      background: var(--paper);
      color: var(--ink);
      font-weight: 950;
      transform: translateX(var(--handle-x, 0px));
      transition: transform .18s ease;
      box-shadow: 4px 4px 0 rgba(164, 24, 20, .85);
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      align-items: end;
      padding: 14px;
      border: 1px solid var(--line);
      background: rgba(10, 10, 9, .5);
    }

    .eyebrow {
      color: #fff0df;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 5px 0 0;
      color: #fffaf1;
      font-size: clamp(28px, 5vw, 58px);
      line-height: .92;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 9px;
    }

    button,
    .download {
      min-height: 42px;
      border: 2px solid var(--paper);
      background: var(--paper);
      color: var(--ink);
      padding: 0 14px;
      font-weight: 950;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 4px 4px 0 rgba(164, 24, 20, .9);
    }

    button.secondary {
      background: transparent;
      color: var(--paper);
      box-shadow: none;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 150px;
      gap: 14px;
      min-height: 0;
    }

    .reader {
      min-height: min(980px, calc(100vh - 140px));
      display: grid;
      place-items: center;
      padding: 18px;
      border: 1px solid var(--line);
      background: rgba(239, 229, 207, .045);
      overflow: hidden;
    }

    .book {
      position: relative;
      width: min(70vh, 82vw);
      aspect-ratio: 2 / 3;
      filter: drop-shadow(0 24px 34px rgba(0, 0, 0, .48));
      cursor: pointer;
      overflow: hidden;
      background: var(--paper);
      border: 1px solid rgba(255, 255, 255, .16);
    }

    .page {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 1px solid rgba(255, 255, 255, .2);
      background: var(--paper);
      transform: translateX(12px);
      transition: transform .32s ease, opacity .32s ease;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      will-change: transform, opacity;
    }

    .page.active {
      opacity: 1;
      transform: translateX(0);
      z-index: 5;
    }

    .page.prev {
      opacity: 0;
      transform: translateX(-12px);
      z-index: 2;
    }

    .page.next {
      opacity: 0;
      transform: translateX(12px);
      z-index: 1;
    }

    aside {
      border: 1px solid var(--line);
      background: rgba(10, 10, 9, .46);
      padding: 10px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 10px;
      min-height: 0;
    }

    .counter {
      font-size: 11px;
      font-weight: 950;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #fff4e7;
    }

    .progress {
      height: 8px;
      margin-top: 8px;
      background: rgba(239, 229, 207, .14);
      border: 1px solid rgba(239, 229, 207, .28);
    }

    .bar {
      height: 100%;
      width: 0%;
      background: var(--red-soft);
      transition: width .25s ease;
    }

    .rail {
      display: grid;
      gap: 8px;
      overflow-y: auto;
      padding-right: 3px;
    }

    .thumb {
      appearance: none;
      border: 1px solid rgba(239, 229, 207, .28);
      background: rgba(239, 229, 207, .08);
      padding: 4px;
      box-shadow: none;
      min-height: auto;
      display: grid;
      gap: 5px;
      color: var(--paper);
      text-align: left;
    }

    .thumb img {
      width: 100%;
      aspect-ratio: 2 / 3;
      object-fit: cover;
      display: block;
    }

    .thumb span {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #d8c7a5;
    }

    .thumb.active {
      border-color: var(--red-soft);
      background: rgba(164, 24, 20, .34);
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .app {
        padding: 10px;
      }

      .splash {
        align-items: start;
        overflow-y: auto;
      }

      .splash-card {
        grid-template-columns: 1fr;
        gap: 22px;
      }

      .cover-stack {
        width: min(56vh, 72vw);
        margin: 0 auto;
      }

      header,
      main {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-content: flex-start;
      }

      .reader {
        min-height: auto;
        padding: 12px;
      }

      .book {
        width: min(78vh, 94vw);
      }

      aside {
        grid-template-rows: auto auto auto;
      }

      .rail {
        grid-template-columns: repeat(12, 72px);
        overflow-x: auto;
        overflow-y: hidden;
      }
    }
  </style>
</head>
<body>
  <section class="splash" id="splash" aria-label="Opening screen">
    <div class="splash-card">
      <div class="cover-stack">
        <img src="./assets/pages/page-01.jpg" alt="Legacy In Ink cover">
      </div>
      <div class="splash-copy">
        <div class="eyebrow">Digital Booklet Experience</div>
        <h2>Open The<br>Frequency</h2>
        <p>Swipe into the archive. Read it like a living booklet: cover, verse pages, reader notes, and the preserved PDF.</p>
        <div class="open-slider" id="openSlider" role="button" tabindex="0" aria-label="Swipe to open the booklet">
          <div class="slider-fill"></div>
          <div class="slider-handle">›</div>
        </div>
      </div>
    </div>
  </section>

  <div class="app">
    <header>
      <section>
        <h1>Legacy In Ink:<br>The Final Frequency</h1>
      </section>
      <nav class="controls" aria-label="Reader controls">
        <button id="prev" type="button">Prev</button>
        <button id="next" type="button">Next</button>
        <button id="cover" class="secondary" type="button">Cover</button>
        <a id="pdfLink" class="download" href="#" target="_blank" rel="noopener">PDF</a>
      </nav>
    </header>

    <main>
      <section class="reader" aria-label="Digital booklet">
        <div class="book" id="book" title="Tap to turn the page"></div>
      </section>

      <aside aria-label="Page navigation">
        <div>
          <div class="counter" id="counter">Page 1 / 34</div>
          <div class="progress" aria-hidden="true"><div class="bar" id="bar"></div></div>
        </div>
        <div class="rail" id="rail"></div>
        <p class="hint">Tap the page, use buttons, or press arrow keys.</p>
      </aside>
    </main>
  </div>

  <script>
    const assetBaseUrl = ".";
    const fallbackPages = Array.from({ length: 34 }, (_, index) => {
      const pageNumber = String(index + 1).padStart(2, "0");
      return {
        page: index + 1,
        title: `Page ${index + 1}`,
        imageUrl: `${assetBaseUrl}/assets/pages/page-${pageNumber}.jpg`
      };
    });

    const toolOutput = window.openai?.toolOutput || {};
    const toolMeta = window.openai?.toolResponseMetadata || {};
    const pages = toolMeta.pages || toolOutput.pages || fallbackPages;
    const pdfUrl = toolMeta.pdfUrl || toolOutput.pdfUrl || `${assetBaseUrl}/assets/legacy-in-ink-the-final-frequency-booklet.pdf`;
    const startPage = Math.max(1, Math.min(pages.length, toolOutput.startPage || toolMeta.startPage || 1));

    const book = document.querySelector("#book");
    const rail = document.querySelector("#rail");
    const counter = document.querySelector("#counter");
    const bar = document.querySelector("#bar");
    const splash = document.querySelector("#splash");
    const openSlider = document.querySelector("#openSlider");
    document.querySelector("#pdfLink").href = pdfUrl;

    let current = startPage - 1;

    const pageEls = pages.map((page, index) => {
      const img = document.createElement("img");
      img.className = "page";
      img.src = page.imageUrl;
      img.alt = page.title || `Legacy In Ink booklet page ${index + 1}`;
      book.appendChild(img);
      return img;
    });

    pages.forEach((page, index) => {
      const thumb = document.createElement("button");
      thumb.type = "button";
      thumb.className = "thumb";
      thumb.innerHTML = `<img src="${page.imageUrl}" alt=""><span>${String(index + 1).padStart(2, "0")}</span>`;
      thumb.addEventListener("click", () => {
        current = index;
        render();
      });
      rail.appendChild(thumb);
    });

    const thumbs = Array.from(document.querySelectorAll(".thumb"));

    function render() {
      pageEls.forEach((page, index) => {
        page.classList.toggle("active", index === current);
        page.classList.toggle("prev", index === current - 1);
        page.classList.toggle("next", index === current + 1);
      });

      thumbs.forEach((thumb, index) => {
        thumb.classList.toggle("active", index === current);
      });

      counter.textContent = `Page ${current + 1} / ${pageEls.length}`;
      bar.style.width = `${((current + 1) / pageEls.length) * 100}%`;
      thumbs[current]?.scrollIntoView({ block: "nearest", inline: "nearest" });
    }

    function openBook() {
      splash.classList.add("hidden");
    }

    let dragging = false;
    let sliderStart = 0;

    function setSliderProgress(clientX) {
      const rect = openSlider.getBoundingClientRect();
      const progress = Math.max(0, Math.min(100, ((clientX - rect.left) / rect.width) * 100));
      const handleX = Math.max(0, Math.min(rect.width - 56, (progress / 100) * (rect.width - 56)));
      openSlider.style.setProperty("--open-progress", `${progress}%`);
      openSlider.style.setProperty("--handle-x", `${handleX}px`);
      if (progress >= 82) openBook();
    }

    function resetSlider() {
      openSlider.style.setProperty("--open-progress", "0%");
      openSlider.style.setProperty("--handle-x", "0px");
    }

    openSlider.addEventListener("pointerdown", (event) => {
      dragging = true;
      sliderStart = event.clientX;
      openSlider.setPointerCapture(event.pointerId);
      setSliderProgress(event.clientX);
    });

    openSlider.addEventListener("pointermove", (event) => {
      if (!dragging) return;
      setSliderProgress(event.clientX);
    });

    openSlider.addEventListener("pointerup", (event) => {
      dragging = false;
      const moved = Math.abs(event.clientX - sliderStart);
      if (moved < 8) openBook();
      if (!splash.classList.contains("hidden")) {
        resetSlider();
      }
    });

    openSlider.addEventListener("keydown", (event) => {
      if (event.key === "Enter" || event.key === " ") openBook();
    });

    document.querySelector("#prev").addEventListener("click", () => {
      current = Math.max(0, current - 1);
      render();
    });

    document.querySelector("#next").addEventListener("click", () => {
      current = Math.min(pageEls.length - 1, current + 1);
      render();
    });

    document.querySelector("#cover").addEventListener("click", () => {
      current = 0;
      render();
    });

    book.addEventListener("click", () => {
      current = Math.min(pageEls.length - 1, current + 1);
      render();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") document.querySelector("#prev").click();
      if (event.key === "ArrowRight") document.querySelector("#next").click();
      if (event.key === "Home") document.querySelector("#cover").click();
    });

    render();
  </script>
</body>
</html>
